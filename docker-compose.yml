version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: carbon-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongodb_data:/data/db
    networks:
      - carbon-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carbon-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://admin:admin123@mongodb:27017/carbon-credit-db?authSource=admin
      JWT_SECRET: your-super-secret-jwt-key-change-this
      NODE_ENV: production
    depends_on:
      - mongodb
    networks:
      - carbon-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: carbon-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - carbon-network

volumes:
  mongodb_data:

networks:
  carbon-network:
    driver: bridge
